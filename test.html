<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test SR</title>
<style>
body{font-family:sans-serif;padding:30px 20px;background:#f5f5f5;text-align:center;}
button{width:100%;padding:20px;font-size:18px;border-radius:12px;border:none;background:#1D9E75;color:#fff;cursor:pointer;margin-bottom:16px;}
button.stop{background:#E24B4A;}
#result{background:#fff;border-radius:12px;padding:16px;min-height:100px;font-size:16px;line-height:1.8;text-align:left;margin-top:12px;}
#status{font-size:14px;color:#666;margin-bottom:12px;}
</style>
</head>
<body>
<h2>🎤 Test micro Android</h2>
<div id="status">Appuie sur le bouton et parle</div>
<button id="btn" onclick="toggle()">▶ Démarrer</button>
<div id="result">Le texte apparaîtra ici...</div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, running = false, final = '';

function toggle(){ running ? stop() : start(); }

function start(){
  if(!SR){ document.getElementById('status').textContent='❌ SpeechRecognition non supporté'; return; }
  document.getElementById('status').textContent='⏳ Démarrage...';
  
  rec = new SR();
  rec.lang = 'fr-FR';
  rec.continuous = false; // Sur Android, continuous=false marche mieux !
  rec.interimResults = true;

  rec.onstart = ()=>{ running=true; document.getElementById('btn').textContent='⏹ Arrêter'; document.getElementById('btn').className='stop'; document.getElementById('status').textContent='🎙️ Parle maintenant !'; };
  
  rec.onresult = (e)=>{
    let interim='';
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('result').textContent = final + interim;
  };

  rec.onerror = (e)=>{ document.getElementById('status').textContent='❌ Erreur: '+e.error; running=false; };
  
  rec.onend = ()=>{
    document.getElementById('status').textContent = running ? '🔄 Relance...' : '✅ Terminé';
    document.getElementById('btn').textContent='▶ Démarrer';
    document.getElementById('btn').className='';
    running=false;
    // Sur Android, continuous=false → on relance manuellement
    if(running) setTimeout(()=>start(), 300);
  };

  rec.start();
}

function stop(){ running=false; if(rec){rec.stop();rec=null;} }
</script>
</body>
</html>
